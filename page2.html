    <div class="fan" id="fan-box"> 
        <img src="Images/fan_blade.jpg">
    </div>
    <button type="button" onclick="rotateFan()">ON</button>
    <button type="button" onclick="stopFan()">OFF</button>
    <button type="button" onclick="toggleFan()">TOGGLE</button>
    <script type="text/javascript">

        function rotateFan(){
            var f = document.querySelector("#fan-box");
            f.classList.add("box-xoay");
        }
        function stopFan(){
            var f = document.querySelector("#fan-box");
            f.classList.remove("box-xoay");
        }
        var isRotating = 0;
        function toggleFan(){
            if(isRotating == 0){
                rotateFan();
                isRotating = 1;
            } 
            else {
                stopFan();
                isRotating = 0;
            }
        }
    </script>
