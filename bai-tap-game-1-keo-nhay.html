<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bài 1 - Bấm Mèo Vui</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: #fff7d6;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }
    .box {
      width: 340px;
      padding: 24px;
      background: white;
      border: 3px solid #222;
      border-radius: 8px;
      box-shadow: 8px 8px 0 #222;
    }

    h1 {
      margin-top: 0;
    }

    #cat {
      font-size: 96px;
      margin: 20px 0;
      transition: transform 0.2s;
    }

    #cat.big {
      transform: scale(1.25) rotate(8deg);
    }

    button {
      padding: 12px 18px;
      margin: 6px;
      border: 2px solid #222;
      border-radius: 8px;
      background: #ffcc33;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #ffdf70;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>Bấm Chó Vui</h1>
    <p id="message">Chó đang bình thường.</p>
    <div id="cat">🐶</div>
    <p>Điểm vui: <span id="score">0</span></p>
    <button onclick="makeHappy()">Làm chó vui</button>
    <button onclick="makeSad()">Làm chó buồn</button>
    <button onclick="resetGame()">Làm lại</button>
    <button onclick="changeBackground()">Đổi màu nền</button>
  </div>

  <script>
    let score = 0;
    let bgIndex = 0;
    const bgColors = ["#d1e7dd", "#ffe5d4", "#dbeafe", "#fff7d6", "#f8d7da", "#e2e3e5"];

    function makeHappy() {
      score = score + 1;

      document.getElementById("score").textContent = score;
      document.getElementById("message").textContent = "Chó vui hơn rồi.";
      document.getElementById("cat").textContent = "😄";
      document.getElementById("cat").classList.add("big");
    }

    function resetGame() {
      score = 0;

      document.getElementById("score").textContent = score;
      document.getElementById("message").textContent = "Chó đang bình thường.";
      document.getElementById("cat").textContent = "🐶";
      document.getElementById("cat").classList.remove("big");
    }

    function makeSad() {
      score = Math.max(0, score - 1);

      document.getElementById("score").textContent = score;
      document.getElementById("message").textContent = "Chó buồn rồi.";
      document.getElementById("cat").textContent = "😢";
      document.getElementById("cat").classList.add("big");
    }

    function changeBackground() {
      bgIndex = (bgIndex + 1) % bgColors.length;
      document.body.style.background = bgColors[bgIndex];
    }

    /*
      Bài tập cho học viên:
      1. Đổi emoji con mèo thành emoji khác.
      2. Khi bấm nút, đổi câu thông báo thành câu của bạn.
      3. Thêm 1 nút làm mèo buồn: đổi emoji thành 😿.
      4. Đổi màu nền của trang bằng JavaScript.
    */
  </script>
</body>
</html>
